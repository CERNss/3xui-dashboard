server:
  port: 9090
  # Change this to a long random secret in production
  jwtSecret: "your-super-secret-jwt-key-change-me"

xui:
  # Base URL of your 3x-ui panel (no trailing slash)
  baseURL: "http://localhost:2053"
  # Bearer API token from 3x-ui panel -> API tokens
  apiToken: "your-3xui-api-token-here"
  # BasePath prefix if your panel is served under a sub-path (e.g. "/xui")
  # Leave empty if panel is at root
  basePath: ""

database:
  # Path to the SQLite database file
  path: "./data/dashboard.db"
