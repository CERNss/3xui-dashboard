name: Security Scan

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

env:
  GO_VERSION: ${{ vars.GO_VERSION || secrets.GO_VERSION || '1.26' }}
  NODE_VERSION: ${{ vars.NODE_VERSION || secrets.NODE_VERSION || '22' }}

jobs:
  go-vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Scans both the listed module dependencies AND the reachable
      # call graph — only flags vulns actually exercised by our code.
      - name: Audit Go dependencies
        working-directory: backend
        run: govulncheck ./...

  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `--omit=dev` because dev-only vulnerabilities don't reach
      # production runtime — vite/vitest/etc never leave the build.
      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  dockerfile-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Base-image pins must match the Dockerfile contract: pinned
      # major.minor on each stage so an upstream tag re-push doesn't
      # silently shift the runtime under us.
      - name: Check Dockerfile base image pins
        run: |
          set -euo pipefail
          grep -Eq '^FROM node:22-alpine AS frontend$' deploy/Dockerfile
          grep -Eq '^FROM golang:1\.[0-9]+-alpine AS backend$' deploy/Dockerfile
          grep -Eq '^FROM alpine:3\.[0-9]+ AS runtime$' deploy/Dockerfile
